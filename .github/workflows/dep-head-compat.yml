# Zcash dependency-version policy, job 2 of 2: HEAD compatibility.
#
# Repoints the governed [patch.crates-io] git pins to their branch HEAD
# (`branch = "main"`) and runs `cargo check`, to catch upstream breaking
# changes before they reach a pinned rev or a release. This is an early-warning
# signal, not a PR gate: it builds against upstream HEAD, not the PR, so it runs
# on a schedule (and on demand). A red run means upstream main no longer builds
# here and needs a human to look.

name: Dependency HEAD Compatibility

on:
  schedule:
    - cron: "41 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  build-against-head:
    name: cargo check against upstream HEAD
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Repoint governed patch pins to branch HEAD
        run: python3 .github/dep-policy/dep_policy.py rewrite-to-head
      - name: Show rewritten manifest
        run: git --no-pager diff -- Cargo.toml || true
      - name: cargo check against HEAD
        run: cargo check --workspace --all-features
