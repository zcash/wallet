name: Build, Attest, Sign and publish Docker Image

on:
  workflow_call:
    outputs:
      image-ref:
        description: "Full image reference that was pushed"
        value: ${{ jobs.build-and-push.outputs.image-ref }}
      image-digest:
        description: "Content digest of the pushed image"
        value: ${{ jobs.build-and-push.outputs.image-digest }}
      oci-artifact-name:
        description: "Name of the exported runtime OCI artifact"
        value: ${{ jobs.build-and-push.outputs.oci-artifact-name }}
      platforms:
        description: "Resolved platform list used for the build"
        value: ${{ jobs.build-and-push.outputs.platforms }}
    inputs:
      image-name:
        description: "Docker image name (e.g. user/repo)"
        required: true
        type: string
      image-tags:
        description: "Comma-separated list of tags"
        required: true
        type: string
      platforms:
        description: "Comma- or newline-separated list of target platforms"
        required: true
        type: string
      oci-artifact-name:
        description: "Artifact name for the exported binaries bundle"
        required: true
        type: string
      dockerhub-namespace:
        description: "Docker Hub namespace/organization (e.g. zodlinc)"
        required: true
        type: string
    secrets:
      dockerhub_username:
        required: true
        description: "Docker Hub username"
      dockerhub_password:
        required: true
        description: "Docker Hub password"
  workflow_dispatch:
    inputs:
      image-name:
        description: "Docker image name (e.g. user/repo)"
        required: true
        type: string
      image-tags:
        description: "Comma-separated list of tags"
        required: true
        type: string
      platforms:
        description: "Comma- or newline-separated list of target platforms"
        required: false
        default: linux/amd64
        type: string
      oci-artifact-name:
        description: "Artifact name for the exported binaries bundle"
        required: true
        type: string

permissions:
  id-token: write        # Needed for keyless signing with Cosign and checkout
  contents: read
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY_HOST: docker.io
      IMAGE_NAMESPACE: ${{ inputs.dockerhub-namespace }}
      IMAGE_NAME: ${{ inputs.image-name }}
      OCI_ARTIFACT_NAME: ${{ inputs.oci-artifact-name }}
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-ref: ${{ steps.emit.outputs.image_ref }}
      oci-artifact-name: ${{ steps.emit.outputs.artifact_name }}
      platforms: ${{ steps.platforms.outputs.platforms }}
    steps:
      - name: Determine image repository
        run: |
          set -euo pipefail
          NAMESPACE="${IMAGE_NAMESPACE:-}"
          IMAGE="${IMAGE_NAME}"
          if [[ -z "$IMAGE" ]]; then
            echo "image-name input is required" >&2
            exit 1
          fi
          if [[ -z "$NAMESPACE" ]]; then
            echo "dockerhub-namespace input is required" >&2
            exit 1
          fi
          NAMESPACE="${NAMESPACE#/}"
          NAMESPACE="${NAMESPACE%/}"
          IMAGE_REPO="${NAMESPACE}/${IMAGE}"
          echo "IMAGE_REPOSITORY=$IMAGE_REPO" >> "$GITHUB_ENV"
          echo "IMAGE_FULL_NAME=${REGISTRY_HOST}/${IMAGE_REPO}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # NOTE: tags are no longer computed here. The amd64 image is pushed BY
      # DIGEST (no tags); the `manifest` job in release.yml assigns the real tags
      # when it stitches the multi-arch index. IMAGE_FULL_NAME (set above) is the
      # tagless repo ref used by push-by-digest, cosign, and SBOM steps.

      - name: Determine target platforms
        id: platforms
        env:
          RAW_PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -euo pipefail
          RAW="${RAW_PLATFORMS}"
          RAW="${RAW//$'\r'/}"
          RAW="${RAW//$'\n'/,}"
          RAW="${RAW// /}"
          PRIMARY=""
          NORMALIZED=""
          IFS=',' read -ra CANDIDATES <<< "$RAW"
          for TOKEN in "${CANDIDATES[@]}"; do
            TOKEN="${TOKEN//[$'\t\r\n ']}"
            [[ -z "$TOKEN" ]] && continue
            NORMALIZED+="${TOKEN},"
            if [[ -z "$PRIMARY" ]]; then
              PRIMARY="$TOKEN"
            fi
          done
          NORMALIZED="${NORMALIZED%,}"
          if [[ -z "$NORMALIZED" ]]; then
            echo "No valid platforms were provided" >&2
            exit 1
          fi
          echo "platforms=$NORMALIZED" >> "$GITHUB_OUTPUT"
          echo "primary=$PRIMARY" >> "$GITHUB_OUTPUT"

      - name: Prepare export directory
        run: mkdir -p build/runtime

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Enable containerd image store
        uses: depot/use-containerd-snapshotter-action@2e6f905d28e7ca519b216e2219d00545537e9f46 # v1.0.0

      # IMPORTANT: do NOT `docker login` before THIS build. The Dockerfile pulls
      # public images anonymously (the `docker/dockerfile` syntax frontend and
      # the `stagex/*` bases). A global login here would make BuildKit attach the
      # registry token to those anonymous public pulls, and Docker Hub rejects
      # token-bearing requests it considers out-of-scope ("insufficient scopes").
      # So BUILD to a local OCI archive with no login (anonymous pulls succeed);
      # the push (skopeo) and cosign/SBOM steps authenticate later, after this.
      - name: Build amd64 image to a local OCI archive (anonymous pulls)
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          file: Dockerfile.stagex
          context: .
          platforms: ${{ steps.platforms.outputs.platforms }}
          sbom: true
          provenance: mode=max
          outputs: |
            type=oci,dest=image-amd64.tar,rewrite-timestamp=true,force-compression=true

      # Push BY DIGEST with skopeo, authenticating only here (push-only token is
      # fine for a push). The multi-arch tags are assembled later by the
      # `manifest` job (release.yml), which stitches this amd64 digest with the
      # Nix-built arm64 digest into one OCI index per tag — so a tag never appears
      # single-arch, and the two arches build on different systems.
      - name: Push amd64 by digest (skopeo, push-only auth)
        id: push
        env:
          DH_USER: ${{ secrets.dockerhub_username }}
          DH_PASS: ${{ secrets.dockerhub_password }}
        run: |
          set -Eeuo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq skopeo >/dev/null
          REPO="${IMAGE_FULL_NAME}"
          DF="$(mktemp)"
          # skopeo can't push to a tagless ref, so push to a short-lived per-run
          # tag and capture the digest. The manifest job references the digest;
          # the temp tag is cleaned up after the release.
          TMP_TAG="sha-${GITHUB_SHA::12}-amd64"
          skopeo copy --dest-creds "${DH_USER}:${DH_PASS}" --digestfile "$DF" \
            "oci-archive:image-amd64.tar" "docker://${REPO}:${TMP_TAG}"
          DIGEST="$(cat "$DF")"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "tmp_tag=${TMP_TAG}" >> "$GITHUB_OUTPUT"
          echo "pushed amd64 ${REPO}@${DIGEST} (temp tag ${TMP_TAG})"

      - name: Extract artifacts from export stage
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          file: Dockerfile.stagex
          context: .
          push: false
          platforms: ${{ steps.platforms.outputs.platforms }}
          target: export
          outputs: |
            type=local,dest=./out,rewrite-timestamp=true,force-compression=true

      # Log in to Docker Hub NOW — AFTER the anonymous-pull build, BEFORE cosign.
      # cosign/syft read credentials from the Docker config store; the build
      # above deliberately ran without login (so its public pulls stayed
      # anonymous), so cosign would otherwise have no creds and 401. The zodlinc
      # token grants pull+push on zodlinc/zallet, which is what cosign needs to
      # write signature/attestation artifacts back to the repo.
      - name: Log in to Docker registry (for cosign/SBOM/attest)
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_password }}

      - name: Collect runtime artifacts per platform
        env:
          PRIMARY_PLATFORM: ${{ steps.platforms.outputs.primary }}
        run: |
          set -euo pipefail

          # Primary platform detected by the earlier normalization step
          PRIMARY="$PRIMARY_PLATFORM"

          # Map platform → suffix (adjust to match your arch_map if needed)
          map_suffix() {
            local plat="$1"
            case "$plat" in
              linux/amd64|linux_amd64) echo "linux-amd64" ;;
              linux/arm64|linux_arm64) echo "linux-arm64" ;;
              *)
                # Default fallback: replace slashes with dashes
                echo "${plat//\//-}"
                ;;
            esac
          }

          # Create final output root directory
          mkdir -p build/runtime

          # Check if the output directory contains multi-platform subdirectories
          if ls out/*_* >/dev/null 2>&1; then
            echo "Detected multi-platform output under ./out"

            # Iterate through subdirectories such as out/linux_amd64, out/linux_arm64, etc.
            for dir in out/*; do
              [ -d "$dir" ] || continue

              # Extract platform directory name (e.g. linux_amd64)
              plat_dir="${dir#out/}"
              # Convert platform into normalized suffix (e.g. linux-amd64)
              suffix="$(map_suffix "$plat_dir")"
              echo "Collecting artifacts for platform '$plat_dir' → suffix '$suffix'"
              # Create target directory inside build/runtime/
              mkdir -p "build/runtime/$suffix"
              # Copy all artifacts from this platform directory
              cp -a "$dir/." "build/runtime/$suffix/"
            done

          else
            echo "Detected single-platform output under ./out"
            # Use the primary platform reported by the 'platforms' step (e.g. linux/amd64)
            plat="$PRIMARY"
            # Convert it to the normalized suffix
            suffix="$(map_suffix "$plat")"
            echo "Collecting artifacts for platform '$plat' → suffix '$suffix'"
            # Create platform-specific directory
            mkdir -p "build/runtime/$suffix"
            # Copy everything from the flat ./out/ export directory
            cp -a out/. "build/runtime/$suffix/"
          fi


      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@8e94d75ddd33f69f691467e42275782e4bfefe84 # v0.20.9

      # cosign/syft below WRITE signatures + SBOM attestations back to the
      # registry as OCI artifacts (pull+push). They read creds from the Docker
      # config store, which is why the "Log in to Docker registry" step runs
      # right before them (after the anonymous-pull build). The zodlinc token
      # grants pull+push on zodlinc/zallet, so these succeed.
      - name: Cosign sign image by digest (keyless OIDC)
        env:
          IMAGE_REF: ${{ env.IMAGE_FULL_NAME }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          echo "Signing $IMAGE_REF@$DIGEST"
          cosign sign --yes "$IMAGE_REF@$DIGEST"

      - name: Generate per-platform SPDX SBOMs
        id: sbom
        env:
          IMAGE_REF: ${{ env.IMAGE_FULL_NAME }}
          DIGEST: ${{ steps.push.outputs.digest }}
          PLATFORMS: ${{ steps.platforms.outputs.platforms }}
        run: |
          set -euo pipefail
          mkdir -p sbom
          IFS=',' read -ra plats <<< "${PLATFORMS}"
          for platform in "${plats[@]}"; do
            plat="$(echo "$platform" | xargs)"
            [[ -z "$plat" ]] && continue
            safe="${plat//\//-}"
            out="sbom/zallet-${safe}.sbom.spdx.json"
            echo "Generating SBOM for $plat -> $out"
            syft "$IMAGE_REF@$DIGEST" --platform "$plat" -o spdx-json > "$out"
            echo "sbom_${safe}=$out" >> "$GITHUB_OUTPUT"
          done

      - name: Attach SBOM attestations
        env:
          IMAGE_REF: ${{ env.IMAGE_FULL_NAME }}
          DIGEST: ${{ steps.push.outputs.digest }}
          PLATFORMS: ${{ steps.platforms.outputs.platforms }}
        run: |
          set -euo pipefail
          IFS=',' read -ra plats <<< "${PLATFORMS}"
          for platform in "${plats[@]}"; do
            plat="$(echo "$platform" | xargs)"
            [[ -z "$plat" ]] && continue
            safe="${plat//\//-}"
            predicate="sbom/zallet-${safe}.sbom.spdx.json"
            if [[ ! -s "$predicate" ]]; then
              echo "Missing SBOM artifact for $plat" >&2
              exit 1
            fi
            echo "Attesting SBOM for $plat"
            cosign attest --yes \
              --type spdxjson \
              --predicate "$predicate" \
              "$IMAGE_REF@$DIGEST"
          done

      - name: Generate SLSA provenance attestation (GitHub)
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-name: ${{ env.IMAGE_FULL_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Per-arch artifact name. upload-artifact v4+ makes each name IMMUTABLE —
      # two uploads of the SAME name do NOT merge (unlike v3); they'd coexist as
      # duplicates and download-by-name would grab only one, so the deb job would
      # find linux-arm64/ but not linux-amd64/ (or vice-versa). The deb job
      # downloads both with a `<name>-*` pattern + merge instead.
      - name: Upload exported binaries artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ env.OCI_ARTIFACT_NAME }}-amd64
          path: build/runtime
          if-no-files-found: error

      - name: Emit workflow outputs
        id: emit
        run: |
          echo "image_ref=${IMAGE_FULL_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${OCI_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "platforms=${RESOLVED_PLATFORMS}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_FULL_NAME: ${{ env.IMAGE_FULL_NAME }}
          OCI_ARTIFACT_NAME: ${{ env.OCI_ARTIFACT_NAME }}
          RESOLVED_PLATFORMS: ${{ steps.platforms.outputs.platforms }}
