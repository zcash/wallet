name: Build, attest, and sign standalone binaries plus Debian packages

on:
  workflow_call:
    inputs:
      version:
        description: "Release version tag (e.g. v1.2.3)"
        required: true
        type: string
      git-sha:
        description: "Source commit SHA"
        required: true
        type: string
      oci-artifact-name:
        description: "Name of the exported binaries artifact to consume"
        required: true
        type: string
      source-image-ref:
        description: "Full Docker image reference (e.g. docker.io/org/image)"
        required: true
        type: string
      source-image-digest:
        description: "Content digest of the source Docker image (sha256:...)"
        required: true
        type: string
      platforms:
        description: "Comma- or newline-separated list of linux/ARCH platforms to package"
        required: true
        type: string
      smoke-distro:
        description: "Debian release used for binary/package smoke tests"
        required: true
        type: string
      apt-distributions:
        description: "Comma- or newline-separated Debian distributions to mirror/publish to apt.z.cash"
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_APT_BUCKET:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.2.3)"
        required: true
        type: string
      git-sha:
        description: "Source commit SHA"
        required: true
        type: string
      oci-artifact-name:
        description: "Name of the exported binaries artifact to consume"
        required: true
        type: string
      source-image-ref:
        description: "Full Docker image reference (e.g. docker.io/org/image)"
        required: true
        type: string
      source-image-digest:
        description: "Content digest of the source Docker image (sha256:...)"
        required: true
        type: string
      platforms:
        description: "Comma- or newline-separated list of linux/ARCH platforms to package"
        required: false
        default: linux/amd64
        type: string
      smoke-distro:
        description: "Debian release used for binary/package smoke tests"
        required: false
        default: bullseye
        type: string
      apt-distributions:
        description: "Comma- or newline-separated Debian distributions to mirror/publish to apt.z.cash"
        required: false
        default: bullseye,bookworm,trixie
        type: string

permissions:
  contents: read

# Prevent concurrent runs for the same tag from racing (e.g., re-runs)
concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  platform_matrix:
    name: Determine platform matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - id: compute
        env:
          PLATFORM_SPEC: ${{ inputs.platforms || 'linux/amd64' }}
          MATRIX_DEBIAN: ${{ inputs['smoke-distro'] || 'bullseye' }}
        run: |
          set -euo pipefail
          MATRIX_JSON=$(
          python3 << 'PY'
          import json
          import os

          raw = os.environ.get("PLATFORM_SPEC", "").replace("\r", "")
          debian_fallback = os.environ.get("MATRIX_DEBIAN", "bullseye").strip() or "bullseye"

          tokens = [tok.strip() for tok in raw.replace("\n", ",").split(",") if tok.strip()]
          if not tokens:
              raise SystemExit("Platform list cannot be empty")

          arch_map = {
              "amd64": {
                  "arch": "amd64",
                  "target": "x86_64-unknown-linux-musl",
                  "suffix": "linux-amd64",
              },
              "arm64": {
                  "arch": "arm64",
                  "target": "aarch64-unknown-linux-musl",
                  "suffix": "linux-arm64",
              },
          }

          entries = []
          for platform in tokens:
              parts = platform.split("/")
              if len(parts) != 2 or parts[0] != "linux":
                  raise SystemExit(f"Unsupported platform '{platform}'")
              arch = parts[1]
              if arch not in arch_map:
                  raise SystemExit(f"Unsupported architecture '{arch}' in platform '{platform}'")
              mapping = arch_map[arch]
              entries.append({
                  "platform": platform,
                  "platform_key": platform.replace("/", "-"),
                  "arch": mapping["arch"],
                  "target": mapping["target"],
                  "binary_suffix": mapping["suffix"],
                  "debian": debian_fallback,
              })

          print(json.dumps(entries))
          PY
          )
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

  binaries_deb_release:
    name: Build and deploy Zallet ${{ matrix.platform_key }} binaries and packages
    runs-on: ubuntu-latest
    needs: platform_matrix

    # Required permissions for Release upload + OIDC/Sigstore attestation
    permissions:
      contents: write        # needed to create/update the Release and upload assets
      id-token: write        # required for OIDC/Sigstore
      attestations: write    # required to persist the attestation

    strategy:
      matrix:
        include: ${{ fromJson(needs.platform_matrix.outputs.matrix) }}

    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_SHA: ${{ inputs.git-sha }}
      OCI_ARTIFACT_NAME: ${{ inputs.oci-artifact-name }}
      SOURCE_IMAGE_REF: ${{ inputs.source-image-ref }}
      SOURCE_IMAGE_DIGEST: ${{ inputs.source-image-digest }}
      SMOKE_TEST_DISTRO: ${{ inputs.smoke-distro }}
      APT_DISTRIBUTIONS: ${{ inputs.apt-distributions }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libclang-dev \
            aptly \
            make \
            python3 \
            lsb-release \
            apt-transport-https \
            ca-certificates \
            gnupg \
            curl \
            wget

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Retrieve GPG signing key from Secrets Manager
        run: |
          aws secretsmanager get-secret-value \
            --secret-id /release/gpg-signing-key \
            --query SecretString \
            --output text > private.pgp

      - name: Import GPG keys
        run: |
          gpg --import private.pgp
          wget -qO - https://apt.z.cash/zcash.asc | gpg --no-default-keyring --keyring trustedkeys.gpg --import

      - name: Install cargo-deb
        # Pin cargo-deb: the floating latest (3.7.0) bumped its MSRV past the
        # runner's stable toolchain and fails to compile with
        # "error[E0658]: `let` expressions in this position are unstable".
        # 2.x has a stable MSRV and the same `--no-build` interface we use.
        # --locked builds against cargo-deb's own lockfile (reproducible deps).
        run: cargo install cargo-deb --version "^2.10" --locked

      # The amd64 and arm64 build jobs each upload a distinct per-arch artifact
      # (`<name>-amd64`, `<name>-arm64`) because v4+ artifacts are immutable and
      # same-name uploads don't merge. Pull BOTH with a pattern + merge-multiple
      # so build/runtime-artifact/ contains linux-amd64/ AND linux-arm64/, and
      # this matrix leg can find its own ${platform_key}/zallet.
      - name: Download exported binaries artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: ${{ env.OCI_ARTIFACT_NAME }}-*
          merge-multiple: true
          path: build/runtime-artifact

      - name: Prepare Debian distribution list
        run: |
          set -euo pipefail
          mkdir -p build
          python3 <<'PY' > build/apt-dists.txt
          import os

          raw = os.environ.get("APT_DISTRIBUTIONS", "")
          parts = [p.strip() for p in raw.replace("\r", "").replace("\n", ",").split(",") if p.strip()]
          if not parts:
              raise SystemExit("APT_DISTRIBUTIONS cannot be empty")
          for part in parts:
              print(part)
          PY
          echo "Will operate on distributions:"
          cat build/apt-dists.txt

      - name: Stage exported binaries
        run: |
          set -euo pipefail

          PLATFORM_KEY="${{ matrix.platform_key }}"
          ARTIFACT_ROOT="build/runtime-artifact/${PLATFORM_KEY}"

          # Basic sanity check: ensure both backend binaries exist at the root
          # (as /zallet and /zallet-zaino in the export image; zebra-state is
          # the default binary name, zaino ships as the additive zallet-zaino).
          if [[ ! -s "${ARTIFACT_ROOT}/zallet" ]]; then
            echo "Missing zallet binary under ${ARTIFACT_ROOT}" >&2
            find "${ARTIFACT_ROOT}" -maxdepth 5 || true
            exit 1
          fi
          if [[ ! -s "${ARTIFACT_ROOT}/zallet-zaino" ]]; then
            echo "Missing zallet-zaino binary under ${ARTIFACT_ROOT}" >&2
            find "${ARTIFACT_ROOT}" -maxdepth 5 || true
            exit 1
          fi

          # Prepare per-platform staging directory (including /usr/local for rsync)
          mkdir -p "build/${PLATFORM_KEY}/usr/local"

          # Store both backend binaries in a stable place for later steps
          # (standalone binary + .deb staging both read them from here), and
          # force executable perms.
          install -m 0755 "${ARTIFACT_ROOT}/zallet"       "build/${PLATFORM_KEY}/zallet"
          install -m 0755 "${ARTIFACT_ROOT}/zallet-zaino" "build/${PLATFORM_KEY}/zallet-zaino"

          # Copy the usr/local tree as-is (completions, manpages, docs, etc.)
          # If there is no usr/local in the artifact, this won't fail because of '|| true'
          rsync -a "${ARTIFACT_ROOT}/usr/local/" "build/${PLATFORM_KEY}/usr/local/" 2>/dev/null || true

      # The deb matrix runs on amd64 runners, but the smoke test execs the
      # per-arch binary inside a `--platform ${{ matrix.platform }}` container.
      # For the arm64 leg that needs QEMU binfmt registered, or the exec fails
      # with "exec /usr/local/bin/zallet: exec format error". Registering QEMU
      # is a no-op for the native amd64 leg.
      - name: Set up QEMU (emulate the non-native arch for the smoke test)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: ${{ matrix.platform }}

      - name: Smoke test exported binary
        run: |
          set -euo pipefail
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/build/${{ matrix.platform_key }}/zallet":/usr/local/bin/zallet:ro \
            "debian:${SMOKE_TEST_DISTRO}-slim" \
            /usr/local/bin/zallet -h

      - name: Prepare standalone binary artifact
        env:
          PLATFORM_KEY: ${{ matrix.platform_key }}
          BINARY_SUFFIX: ${{ matrix.binary_suffix }}
        run: |
          set -euo pipefail
          mkdir -p standalone
          # Default (zebra-state) binary keeps the plain suffixed name; the zaino
          # backend ships as an additive `-zaino` standalone binary.
          cp "build/${PLATFORM_KEY}/zallet"       "standalone/zallet-${RELEASE_VERSION}-${BINARY_SUFFIX}"
          cp "build/${PLATFORM_KEY}/zallet-zaino" "standalone/zallet-${RELEASE_VERSION}-${BINARY_SUFFIX}-zaino"

      - name: Generate provenance chain metadata
        env:
          BINARY_SUFFIX: ${{ matrix.binary_suffix }}
          GH_WORKFLOW: ${{ github.workflow }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          BINARY_PATH="standalone/zallet-${RELEASE_VERSION}-${BINARY_SUFFIX}"
          BINARY_SHA256=$(sha256sum "$BINARY_PATH" | cut -d' ' -f1)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > "standalone/zallet-${RELEASE_VERSION}-${BINARY_SUFFIX}.provenance.json" <<EOF
          {
            "version": "1.0",
            "subject": {
              "name": "zallet-${RELEASE_VERSION}-${BINARY_SUFFIX}",
              "sha256": "${BINARY_SHA256}"
            },
            "source": {
              "image_ref": "${SOURCE_IMAGE_REF}",
              "image_digest": "${SOURCE_IMAGE_DIGEST}",
              "git_sha": "${RELEASE_SHA}",
              "git_ref": "${RELEASE_VERSION}"
            },
            "extraction": {
              "workflow": "${GH_WORKFLOW}",
              "run_id": "${GH_RUN_ID}",
              "run_attempt": "${GH_RUN_ATTEMPT}",
              "runner_os": "${GH_RUNNER_OS}",
              "timestamp": "${TIMESTAMP}"
            },
            "verification": {
              "docker_image_attestation": "${SOURCE_IMAGE_REF}@${SOURCE_IMAGE_DIGEST}",
              "note": "This binary was extracted from the Docker image above. Verify the image attestation for full build provenance."
            }
          }
          EOF

      - name: GPG sign standalone binaries
        env:
          BINARY_SUFFIX: ${{ matrix.binary_suffix }}
        run: |
          set -euo pipefail
          for b in "standalone/zallet-${RELEASE_VERSION}-${BINARY_SUFFIX}" \
                   "standalone/zallet-${RELEASE_VERSION}-${BINARY_SUFFIX}-zaino"; do
            gpg -u sysadmin@zodl.com --armor --digest-algo SHA256 --detach-sign "$b"
          done

      - name: Generate SPDX SBOM for standalone binary
        env:
          BINARY_SUFFIX: ${{ matrix.binary_suffix }}
        run: |
          python3 <<'PY'
          import hashlib
          import os
          from pathlib import Path

          base = f"standalone/zallet-{os.environ['RELEASE_VERSION']}-{os.environ['BINARY_SUFFIX']}"
          # SBOM for both backend binaries (default zebra-state + additive zaino).
          for binary_path in (Path(base), Path(f"{base}-zaino")):
              if not binary_path.exists():
                  raise SystemExit(f"Missing binary at {binary_path}")
              checksum = hashlib.sha256(binary_path.read_bytes()).hexdigest()
              output = binary_path.parent / f"{binary_path.name}.sbom.spdx"
              doc = f"""SPDXVersion: SPDX-2.3
          DataLicense: CC0-1.0
          SPDXID: SPDXRef-DOCUMENT
          DocumentName: {binary_path.name}
          DocumentNamespace: https://github.com/{os.environ['GITHUB_REPOSITORY']}/sbom/{binary_path.name}-{checksum}
          Creator: Tool: zallet-ci-spdx-1.0
          Created: 1970-01-01T00:00:00Z
          PackageName: {binary_path.name}
          PackageSPDXID: SPDXRef-Package-{checksum[:12]}
          PackageDownloadLocation: NOASSERTION
          FilesAnalyzed: false
          PackageChecksum: SHA256: {checksum}
          """
              output.write_text(doc, encoding="utf-8")
          PY

      - name: Generate build provenance attestation for binaries
        id: binary-attest
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          # Attest both backend binaries in one call (multi-line subject-path).
          subject-path: |
            standalone/zallet-${{ env.RELEASE_VERSION }}-${{ matrix.binary_suffix }}
            standalone/zallet-${{ env.RELEASE_VERSION }}-${{ matrix.binary_suffix }}-zaino

      - name: Save binary attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.binary-attest.outputs['bundle-path'] }}
        run: |
          # One bundle covers both subjects; publish it under both names so each
          # binary has a co-located .intoto.jsonl next to it in the Release.
          cp -- "$BUNDLE_PATH" "standalone/zallet-${RELEASE_VERSION}-${{ matrix.binary_suffix }}.intoto.jsonl"
          cp -- "$BUNDLE_PATH" "standalone/zallet-${RELEASE_VERSION}-${{ matrix.binary_suffix }}-zaino.intoto.jsonl"

      - name: Seed cargo target tree with the imported artifacts
        run: |
          set -euo pipefail

          PLATFORM_KEY="${{ matrix.platform_key }}"
          TARGET_TRIPLE="${{ matrix.target }}"

          # Root where the export stage stored all Zallet assets under /usr/local/share/zallet
          ROOT="build/${PLATFORM_KEY}/usr/local/share/zallet"

          TARGET_DIR="target/${TARGET_TRIPLE}/release"
          COMPLETIONS_DIR="${TARGET_DIR}/completions"
          MANPAGES_DIR="${TARGET_DIR}/manpages"

          mkdir -p "${TARGET_DIR}" "${COMPLETIONS_DIR}" "${MANPAGES_DIR}"

          # Seed both backend binaries for cargo-deb --no-build (the `zallet`
          # package ships `zallet` = zebra-state + `zallet-zaino` = zaino), plus
          # a `zallet-zebra-state` symlink so the default backend is nameable
          # both ways. cargo-deb (^2.10) preserves a symlink asset as a symlink.
          install -m 0755 "build/${PLATFORM_KEY}/zallet"       "${TARGET_DIR}/zallet"
          install -m 0755 "build/${PLATFORM_KEY}/zallet-zaino" "${TARGET_DIR}/zallet-zaino"
          ln -sf zallet "${TARGET_DIR}/zallet-zebra-state"

          # Copy the whole completions tree (whatever is inside)
          cp -a "${ROOT}/completions/." "${COMPLETIONS_DIR}/" 2>/dev/null || true

          # Copy the whole manpages tree
          cp -a "${ROOT}/manpages/." "${MANPAGES_DIR}/" 2>/dev/null || true

          # Copy Debian copyright metadata
          install -m 0644 "${ROOT}/debian-copyright" \
            "${TARGET_DIR}/debian-copyright" 2>/dev/null || true


      - name: Build package (cargo deb --no-build)
        run: |
          set -euo pipefail
          # The deb matrix runs on amd64 runners. cargo-deb honours the crate's
          # `separate-debug-symbols = true`, which shells out to `strip`. The host
          # (amd64) `strip` can't process the cross-arch (arm64) ELF and fails with
          # "Unable to strip binary ... strip: exit status: 1". Install the
          # target's binutils and point cargo-deb's strip at it via $STRIP so the
          # debug-symbol split works for BOTH arches (no behaviour change vs the
          # amd64-only pipeline).
          case "${{ matrix.target }}" in
            aarch64-*) sudo apt-get update -qq && sudo apt-get install -y -qq binutils-aarch64-linux-gnu
                       export STRIP=aarch64-linux-gnu-strip OBJCOPY=aarch64-linux-gnu-objcopy ;;
          esac
          cargo deb --no-build --target ${{ matrix.target }}

      - name: Rename package to not collide across the matrix
        run: |
          set -euo pipefail
          # cargo-deb writes under target/<triple>/debian/ when --target is used
          # (not the bare target/debian/). Search the whole target tree for the
          # .deb. NOTE: `find` over a path that doesn't exist (e.g. target/debian
          # when --target was used) exits non-zero, and `set -euo pipefail` would
          # then abort on the command substitution BEFORE we inspect $DEB — so
          # search only `target` (always exists) and prune for the .deb. `|| true`
          # guards the pipeline regardless.
          DEB="$(find target -type f -name 'zallet_*.deb' 2>/dev/null | head -1 || true)"
          if [ -z "$DEB" ]; then echo "no .deb produced by cargo-deb" >&2; find target -name '*.deb' 2>/dev/null || true; exit 1; fi
          echo "found deb: $DEB"
          mv "$DEB" "zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb"

      - name: Smoke test Debian package
        run: |
          set -euo pipefail
          mkdir -p smoke
          cp "zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb" smoke/package.deb
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/smoke":/release:ro \
            "debian:${SMOKE_TEST_DISTRO}-slim" \
            bash -euo pipefail -c "\
              apt-get update >/dev/null && \
              apt-get install -y --no-install-recommends ca-certificates >/dev/null && \
              dpkg -i /release/package.deb || apt-get -f install -y >/dev/null && \
              zallet -h >/dev/null"

      # NOTE: APT index publishing (aptly mirror/snapshot/publish + S3 sync) was
      # MOVED OUT of this per-arch matrix into the single `apt_publish` job below.
      # Reason: when the matrix runs amd64 + arm64 in parallel, each job would
      # regenerate dists/ (the signed APT index) seeing only its OWN arch and
      # race to S3 sync it — leaving the published index listing just one
      # architecture. A single downstream job that ingests BOTH .debs and
      # publishes with `-architectures=amd64,arm64` produces a consistent index.
      # Here the matrix only builds, smoke-tests, signs, and uploads its .deb.

      - name: GPG sign Debian package
        run: |
          gpg -u sysadmin@zodl.com --armor --digest-algo SHA256 --detach-sign "zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb"

      - name: Generate provenance chain metadata for .deb
        env:
          PACKAGE_ARCH: ${{ matrix.arch }}
          GH_WORKFLOW: ${{ github.workflow }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          DEB_PATH="zallet_${RELEASE_VERSION}_${PACKAGE_ARCH}.deb"
          DEB_SHA256=$(sha256sum "$DEB_PATH" | cut -d' ' -f1)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > "${DEB_PATH}.provenance.json" <<EOF
          {
            "version": "1.0",
            "subject": {
              "name": "zallet_${RELEASE_VERSION}_${PACKAGE_ARCH}.deb",
              "sha256": "${DEB_SHA256}"
            },
            "source": {
              "image_ref": "${SOURCE_IMAGE_REF}",
              "image_digest": "${SOURCE_IMAGE_DIGEST}",
              "git_sha": "${RELEASE_SHA}",
              "git_ref": "${RELEASE_VERSION}"
            },
            "extraction": {
              "workflow": "${GH_WORKFLOW}",
              "run_id": "${GH_RUN_ID}",
              "run_attempt": "${GH_RUN_ATTEMPT}",
              "runner_os": "${GH_RUNNER_OS}",
              "timestamp": "${TIMESTAMP}"
            },
            "verification": {
              "docker_image_attestation": "${SOURCE_IMAGE_REF}@${SOURCE_IMAGE_DIGEST}",
              "note": "This package was built from binaries extracted from the Docker image above. Verify the image attestation for full build provenance."
            }
          }
          EOF

      - name: Generate SPDX SBOM for Debian package
        env:
          PACKAGE_ARCH: ${{ matrix.arch }}
        run: |
          python3 <<'PY'
          import hashlib
          import os
          from pathlib import Path

          package_path = Path(f"zallet_{os.environ['RELEASE_VERSION']}_{os.environ['PACKAGE_ARCH']}.deb")
          if not package_path.exists():
              raise SystemExit(f"Missing package at {package_path}")
          checksum = hashlib.sha256(package_path.read_bytes()).hexdigest()
          output = package_path.parent / f"{package_path.name}.sbom.spdx"
          doc = f"""SPDXVersion: SPDX-2.3
          DataLicense: CC0-1.0
          SPDXID: SPDXRef-DOCUMENT
          DocumentName: {package_path.name}
          DocumentNamespace: https://github.com/{os.environ['GITHUB_REPOSITORY']}/sbom/{package_path.name}-{checksum}
          Creator: Tool: zallet-ci-spdx-1.0
          Created: 1970-01-01T00:00:00Z
          PackageName: {package_path.name}
          PackageSPDXID: SPDXRef-Package-{checksum[:12]}
          PackageDownloadLocation: NOASSERTION
          FilesAnalyzed: false
          PackageChecksum: SHA256: {checksum}
          """
          output.write_text(doc, encoding="utf-8")
          PY

      - name: Generate build provenance attestation for .deb
        id: attest
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: zallet_${{ env.RELEASE_VERSION }}_${{ matrix.arch }}.deb

      - name: Save .deb attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs['bundle-path'] }}
        run: |
          cp -- "$BUNDLE_PATH" "zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb.intoto.jsonl"

      - name: Collect release deliverables
        run: |
          set -euo pipefail
          DEST="release/${{ matrix.platform_key }}"
          mkdir -p "$DEST"
          cp standalone/* "$DEST"/
          cp zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb "$DEST/"
          cp zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb.asc "$DEST/"
          cp zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb.sbom.spdx "$DEST/"
          cp zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb.intoto.jsonl "$DEST/"
          cp zallet_${RELEASE_VERSION}_${{ matrix.arch }}.deb.provenance.json "$DEST/"

      - name: Upload artifacts for publish job
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: release-${{ matrix.platform_key }}
          path: release/${{ matrix.platform_key }}/*

  # Single APT-index publish for ALL architectures. The per-arch matrix only
  # builds + signs + uploads its .deb (as release-<platform_key> artifacts); this
  # job ingests every arch's .deb, builds ONE merged snapshot per distribution,
  # and publishes it with `-architectures=amd64,arm64` + a single S3 sync — so
  # the signed dists/ index lists BOTH arches consistently (no parallel race).
  apt_publish:
    name: Publish multi-arch APT index
    needs: binaries_deb_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      APT_DISTRIBUTIONS: ${{ inputs.apt-distributions }}
    steps:
      - name: Download all per-arch release artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: debs
          merge-multiple: true
          pattern: release-*
      - name: Install aptly + tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          # NB: don't apt-install awscli — it was dropped from the Ubuntu 24.04
          # (noble) repos ("Package 'awscli' has no installation candidate"). The
          # GH runner ships AWS CLI v2 preinstalled and configure-aws-credentials
          # (next step) relies on it, so only aptly + gnupg are needed here.
          sudo apt-get install -y --no-install-recommends aptly gnupg
          aws --version
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Import GPG signing key from Secrets Manager
        run: |
          set -euo pipefail
          aws secretsmanager get-secret-value --secret-id /release/gpg-signing-key \
            --query SecretString --output text > /tmp/k.pgp
          gpg --batch --import /tmp/k.pgp
          shred -u /tmp/k.pgp
      - name: Build distribution list
        run: |
          set -euo pipefail
          echo "${APT_DISTRIBUTIONS}" | tr ',' '\n' | sed '/^$/d' > /tmp/dists.txt
          echo "dists:"; cat /tmp/dists.txt
      - name: Publish merged multi-arch APT index
        env:
          APT_BUCKET: ${{ secrets.AWS_APT_BUCKET }}
        run: |
          set -euo pipefail
          key=$(gpg --list-secret-keys --keyid-format=long sysadmin@zodl.com | head -n 2 | grep -v sec | tr -d ' ')

          # We REGENERATE the index from the .deb pool instead of `aptly mirror`-ing
          # the live repo. Two reasons:
          #   1. aptly's strict parser rejects the existing apt.z.cash Packages with
          #      "malformed stanza syntax" — some historical zcashd entries have
          #      Description continuation lines that don't start with a space (apt &
          #      dpkg tolerate this; aptly does not). Mirroring is therefore fragile.
          #   2. Regenerating from the .deb files reads each package's control data
          #      straight from the archive (always well-formed), producing a clean,
          #      correct Packages — and incidentally repairs those malformed stanzas.
          # We pull the existing pool from S3 and re-add every package so NOTHING is
          # dropped; only the index is rebuilt. Per-suite bucketing (below) keeps
          # stretch/buster packages out of the bullseye/bookworm indices.
          mkdir -p poolcache
          aws s3 sync "s3://${APT_BUCKET}/pool/" poolcache/ --no-progress --exclude '*' --include '*.deb'
          echo "pool debs pulled: $(find poolcache -name '*.deb' | wc -l)"

          mapfile -t dists < /tmp/dists.txt
          for dist in "${dists[@]}"; do
            repo="zcash_${dist}"; snap="snap_${dist}"
            aptly repo drop -force "$repo" >/dev/null 2>&1 || true
            aptly repo create --distribution "$dist" --component main "$repo"

            # Existing pool packages for THIS suite only. Suite is encoded in the
            # filename (e.g. zcash-6.11.0-amd64-bookworm.deb, zallet_..._bullseye.deb),
            # matched on a -/_ boundary so 'bullseye' never matches 'bookworm'.
            while IFS= read -r deb; do
              aptly repo add -force-replace "$repo" "$deb" || echo "skip (already present?): $deb"
            done < <(find poolcache -name "*[-_]${dist}.deb")

            # Our NEW zallet .debs (amd64 + arm64) carry no suite suffix — they're
            # static-musl and valid on every suite, so add them to each dist.
            find debs -name 'zallet_*.deb' -exec aptly repo add -force-replace "$repo" {} +

            aptly snapshot drop -force "$snap" >/dev/null 2>&1 || true
            aptly snapshot create "$snap" from repo "$repo"
            # ONE publish per suite with BOTH architectures → consistent dists/ index.
            aptly publish snapshot -architectures=amd64,arm64 -gpg-key="$key" -distribution="$dist" "$snap"
          done
      - name: Sync merged index + pool to apt.z.cash (single writer)
        run: |
          set -euo pipefail
          # Sync the FULL published pool (aptly lays out every package the index
          # references — zcash + zallet — under pool/main/z/...). The regenerated
          # dists/ index points at these exact pool paths, so push the whole pool
          # tree to keep index↔pool consistent. No --delete: stretch/buster dists
          # we didn't republish stay untouched in S3.
          aws s3 sync "$HOME/.aptly/public/pool/" "s3://${{ secrets.AWS_APT_BUCKET }}/pool/" --no-progress
          aws s3 sync "$HOME/.aptly/public/dists/" "s3://${{ secrets.AWS_APT_BUCKET }}/dists/" --no-progress

  publish:
    name: Create/Update GitHub Release (aggregate)
    needs: binaries_deb_release
    if: ${{ startsWith(inputs.version, 'v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: artifacts
          merge-multiple: true
          pattern: release-*

      - name: Publish/Update GitHub Release (incremental)
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          append_body: true
          overwrite_files: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
