[workspace]
members = [
    "zallet",
]
resolver = "2"

[workspace.package]
authors = [
    "Jack Grigg <jack@electriccoin.co>",
    "Kris Nuttycombe <kris@electriccoin.co>",
]
edition = "2024"
rust-version = "1.85"
repository = "https://github.com/zcash/wallet"
license = "MIT OR Apache-2.0"
categories = ["cryptography::cryptocurrencies"]

[workspace.dependencies]
# Async
async-trait = "0.1"
futures = "0.3"
tokio = "1"

# Documentation
documented = "0.3"
extruct = "0.2"
phf = "0.11"

# Filesystem
home = "0.5"
known-folders = "1"
xdg = "2.5"

# Key storage
age = { version = "0.11", features = ["armor", "cli-common", "plugin"] }
bip0039 = "0.12"

# Localization
i18n-embed = { version = "0.15", features = ["fluent-system"] }
i18n-embed-fl = "0.9"
rust-embed = "8"

# Logging
tracing = { version = "0.1", features = ["attributes"] }

# Parsing and serialization
hex = "0.4"
serde = { version = "1", features = ["serde_derive"] }
serde_json = { version = "1", features = ["arbitrary_precision", "raw_value"] }
toml = "0.8"
zcash_address = "0.8"

# Randomness
rand = "0.8"

# CLI
abscissa_core = "0.8"
abscissa_tokio = "0.8"
clap = { version = "4.5", features = ["derive"] }
rpassword = "7"

# RPC
http-body-util = "0.1"
hyper = "1"
jsonrpsee = "0.24"
schemars = "0.8"
tower = "0.4"

# Zcash consensus
zcash_protocol = "0.5"

# Zcash payment protocols
orchard = "0.11"
sapling = { package = "sapling-crypto", version = "0.5" }
transparent = { package = "zcash_transparent", version = "0.3" }
zcash_keys = { version = "0.9", features = ["transparent-inputs", "sapling", "orchard", "transparent-key-encoding"] }
zcash_primitives = "0.23"
zcash_proofs = "0.23"
secp256k1 = "0.29"

# Zcash chain state
zaino-fetch = { git = "https://github.com/zingolabs/zaino.git", rev = "688817639762b244a1617c30faf1abb586f8823b" }
zaino-proto = { git = "https://github.com/zingolabs/zaino.git", rev = "688817639762b244a1617c30faf1abb586f8823b" }
zaino-state = { git = "https://github.com/zingolabs/zaino.git", rev = "688817639762b244a1617c30faf1abb586f8823b" }
zebra-chain = { git = "https://github.com/ZcashFoundation/zebra.git", rev = "8b9fdd073d822a02768927634c635e84edb4eee4" }
zebra-rpc = { git = "https://github.com/ZcashFoundation/zebra.git", rev = "8b9fdd073d822a02768927634c635e84edb4eee4" }
zebra-state = { git = "https://github.com/ZcashFoundation/zebra.git", rev = "8b9fdd073d822a02768927634c635e84edb4eee4" }

# Zcash wallet
deadpool = "0.12"
deadpool-sqlite = "0.9"
deadpool-sync = "0.1"
incrementalmerkletree = "0.8.2"
rusqlite = { version = "0.32", features = ["time"] }
schemerz = "0.2"
schemerz-rusqlite = "0.320.0"
secrecy = "0.8"
shardtree = "0.6"
time = "0.3"
uuid = "1"
zcash_client_backend = "0.19"
zcash_client_sqlite = "0.17"
zcash_note_encryption = "0.4"
zip32 = "0.2"
bip32 = "0.2"

# Zcashd wallet migration
zewif = { version = "0.1" }
zewif-zcashd = { version = "0.1" }
anyhow = "1.0"

# lightwalletd (temporary)
tonic = "0.13"

[patch.crates-io]
age = { git = "https://github.com/str4d/rage.git", rev = "84dc1e9f641994388f107ceebdbaa00126e30e16" }
equihash = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
transparent = { package = "zcash_transparent", git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_address = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_client_backend = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_client_sqlite = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_encoding = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_history = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_keys = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_primitives = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_proofs = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zcash_protocol = { git = "https://github.com/nuttycom/librustzcash.git", rev = "1c0d6b9fcddfc1fd252d33d5a8a342a05c15cc0a" }
zip32 = { git = "https://github.com/zcash/zip32", rev = "bbd4e9c24356837c4eeb2aa23ac93ba86984bc9f" }

zewif = { git = "https://github.com/BlockchainCommons/zewif.git", rev = "8f005a6f5a189815dc08821f99cfe7e8af4e7f62" }
zewif-zcashd = { git = "https://github.com/BlockchainCommons/zewif-zcashd.git", rev = "74cd5bc2a66a8ce63534c2c1c9ff2dedb2f9d9fd" }

# Apply https://github.com/ZcashFoundation/zebra/pull/9536 on top of what Zaino depends on.
[patch."https://github.com/ZcashFoundation/zebra.git"]
zebra-chain = { git = "https://github.com/str4d/zebra.git", rev = "a77de50caef234e13ccf74452a6c010b65f48e82" }
zebra-rpc = { git = "https://github.com/str4d/zebra.git", rev = "a77de50caef234e13ccf74452a6c010b65f48e82" }
zebra-state = { git = "https://github.com/str4d/zebra.git", rev = "a77de50caef234e13ccf74452a6c010b65f48e82" }
